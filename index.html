<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay"></div>

    <header>
        <img src="img/logo.pmg.png" alt="Logo" class="logo">
    </header>

    <main>

        <div class="login">

            <h1>Entrar</h1>

            <form>

                <input type="email" placeholder="Email ou telefone" required>

                <input type="password" placeholder="Senha" required>

                <button type="submit">
                    Entrar
                </button>

                <div class="opcoes">

                    <label>
                        <input type="checkbox">
                        Lembrar de mim
                    </label>

                    <a href="#">Precisa de ajuda?</a>

                </div>

            </form>

            <div class="cadastro">

                <p>
                    Novo por aqui?
                    <a href="#">Criar conta</a>
                </p>

                <small>
                    Esta página foi desenvolvida apenas para fins de estudo e prática de HTML e CSS.
                </small>

            </div>

        </div>

    </main>

    <footer>

        <p>© 2026 - Projeto desenvolvido apenas para estudo.</p>

    </footer>

</body>
</html>
